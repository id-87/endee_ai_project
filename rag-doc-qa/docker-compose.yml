version: "3.9"

services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data
    restart: unless-stopped

  app:
    build: .
    container_name: rag-doc-qa
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENDEE_HOST=http://endee:8080/api/v1
    depends_on:
      - endee
    restart: unless-stopped

volumes:
  endee-data: